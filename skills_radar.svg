<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 390" width="700" height="390">
<!--
  All 7 Gaussians centred at cx=350, baseline y=275. Canvas 700x390.
  Chart area: x=25..675, y=20..275.
  y_svg = 275 - amp * exp( -(x-350)^2 / (2*sigma^2) )

  Skill   amp  sigma  peak_y  colour
  GenAI   235   30      40    #00f5ff
  ML      200   45      75    #7b2ff7
  DL      165   58     110    #c77dff
  CP      140   72     135    #90be6d
